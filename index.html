.site-main > .inner{
  --padding-horizontal:2rem;
  --padding-vertical:2rem;
  --spacing:2rem;
  --width:45rem;
  border-radius:calc(3rem - 1px);
  max-width:100%;
  position:relative;
  width:var(--width);
  z-index:1;
  padding:var(--padding-vertical) var(--padding-horizontal);
}
.site-main > .inner > *{margin-top:var(--spacing);margin-bottom:var(--spacing);}
.site-main > .inner > :first-child{margin-top:0 !important;}
.site-main > .inner > :last-child{margin-bottom:0 !important;}

/* Inner content panel */
.container{
  display:flex;
  width:100%;
  align-items:center;
  justify-content:center;
  background-color:#28272E;
  border:solid 1px rgba(255,255,255,0.2);
  border-radius:2.25rem;
}
.container > .inner{
  --padding:4rem;
  --spacing:1rem;
  padding:var(--padding);
  border-radius:calc(2.25rem - 1px);
  width:100%;
}
.container > .inner > *{margin-top:var(--spacing);margin-bottom:var(--spacing);}
.container > .inner > :first-child{margin-top:0 !important;}
.container > .inner > :last-child{margin-bottom:0 !important;}

/* Logo */
.logo{display:block;line-height:0;position:relative;}
.logo > .frame{
  display:inline-block;
  overflow:hidden;
  vertical-align:top;
  width:6.5rem;
  border-radius:100%;
  border:1px solid rgba(255,255,255,0.141);
}
.logo > .frame > img{
  border-radius:inherit;
  max-width:100%;
  vertical-align:top;
  width:inherit;
  padding:0.25rem;
}

/* Title */
.title{
  color:#FFFFFF;
  font-family:'Martian Mono', monospace;
  letter-spacing:0.025rem;
  font-size:2.75em;
  line-height:1.2;
  font-weight:200;
}

/* Subtitle */
.subtitle{
  color:rgba(255,255,255,0.612);
  font-family:'Martian Mono', monospace;
  font-size:1em;
  line-height:2;
  font-weight:200;
}

/* Button */
.buttons{
  cursor:default;
  display:flex;
  justify-content:center;
  gap:0.875rem;
  flex-direction:row;
  flex-wrap:wrap;
  padding:0;
  margin-top:3rem !important;
  margin-bottom:3rem !important;
}
.buttons > li{max-width:100%;text-align:center;}
.buttons > li.cta{flex:0 0 auto;}
.buttons > li.break{flex:0 0 100%;height:0.25rem;margin:0;padding:0;}

/* Primary + secondary CTA pair */
.buttons > li > a{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:0.5rem;
  min-width:8.75rem;
  height:3.125rem;
  padding:0 1.5rem;
  text-decoration:none;
  white-space:nowrap;
  font-family:'Martian Mono', monospace;
  font-size:0.95em;
  font-weight:200;
  letter-spacing:0.02em;
  border-radius:0.85rem;
  color:#FFFFFF;
  border:1px solid transparent;
  background-color:transparent;
  transition:transform 0.2s ease, background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
}
.buttons > li > a > svg{
  display:block;
  fill:currentColor;
  flex-grow:0;
  flex-shrink:0;
  height:1.15em;
  width:1.15em;
  min-width:14px;
  pointer-events:none;
  transition:fill 0.2s ease;
}
.buttons > li > a > .label{overflow:visible;line-height:1.4;}

.buttons > li > a.primary{
  background-color:#DE8B5D;
  color:#241E1A;
}
.buttons > li > a.primary:hover{
  background-color:#F29D6D;
  transform:translateY(-2px);
}
.buttons > li > a.secondary{
  background-color:rgba(255,255,255,0.04);
  border-color:rgba(255,255,255,0.18);
}
.buttons > li > a.secondary:hover{
  background-color:rgba(255,255,255,0.09);
  border-color:rgba(255,255,255,0.4);
  transform:translateY(-2px);
}

/* Social icon buttons */
.buttons > li > a.icon-only{
  min-width:0;
  width:2.5rem;
  height:2.5rem;
  padding:0;
  gap:0;
  border-radius:50%;
  background-color:transparent;
  border:1px solid rgba(255,255,255,0.25);
}
.buttons > li > a.icon-only > svg{
  width:1.1em;
  height:1.1em;
  fill:rgba(255,255,255,0.7);
}
.buttons > li > a.icon-only:hover{
  background-color:transparent;
  border-color:rgba(255,255,255,0.55);
  transform:scale(1.08);
}
.buttons > li > a.icon-only:hover > svg{
  fill:#FFFFFF;
}

/* Divider */
.divider{
  align-items:center;
  border:0;
  display:flex;
  justify-content:center;
  min-height:1rem;
  padding:0;
  position:relative;
  width:100%;
  margin-top:3rem !important;
  margin-bottom:3rem !important;
}
.divider::before{content:'';width:100%;background-color:rgba(255,255,255,0.2);height:1px;}

/* Entrance animations */
@keyframes fade-up{from{opacity:0;transform:translateY(1.25rem);}to{opacity:1;transform:none;}}
@keyframes fade-in{from{opacity:0;}to{opacity:1;}}
.logo{animation:fade-up 1s ease both;}
.title{animation:fade-up 1s ease 0.125s both;}
.subtitle{animation:fade-in 0.6s ease 0.35s both;}
.buttons{animation:fade-up 1s ease 0.35s both;}
@media (prefers-reduced-motion: reduce){
  .logo,.title,.subtitle,.buttons{animation:none;}
}

/* Responsive */
@media (max-width:1680px){html{font-size:11pt;}}
@media (max-width:1280px){html{font-size:11pt;}}
@media (max-width:980px){html{font-size:9pt;}}
@media (max-width:736px){
  html{font-size:10pt;}
  .site-wrapper{padding:2rem;}
  .site-main > .inner{--padding-horizontal:1rem;--padding-vertical:1rem;--spacing:2rem;}
  .container > .inner{--padding:2.5rem;}
  .buttons{margin-top:2.25rem !important;margin-bottom:2.25rem !important;}
  .divider{margin-top:2rem !important;margin-bottom:2rem !important;}
}
@media (max-width:480px){
  .site-wrapper{padding:1rem;}
  .site-main > .inner{--spacing:1.75rem;}
}
@media (max-width:360px){
  .site-wrapper{padding:0.5rem;}
  .site-main > .inner{--padding-horizontal:0.75rem;--padding-vertical:0.75rem;--spacing:1.5rem;}
  .title{font-size:2em;}
  .container > .inner{--padding:1.875rem;}
}
