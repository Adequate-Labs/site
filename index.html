.site-main > .inner{
  --padding-horizontal:2rem;
  --padding-vertical:2rem;
  --spacing:2rem;
  --width:45rem;
  border-radius:calc(3rem - 1px);
  max-width:100%;
  position:relative;
  width:var(--width);
  z-index:1;
  padding:var(--padding-vertical) var(--padding-horizontal);
}
.site-main > .inner > *{margin-top:var(--spacing);margin-bottom:var(--spacing);}
.site-main > .inner > :first-child{margin-top:0 !important;}
.site-main > .inner > :last-child{margin-bottom:0 !important;}

/* Inner content panel */
.container{
  display:flex;
  width:100%;
  align-items:center;
  justify-content:center;
  background-color:#28272E;
  border:solid 1px rgba(255,255,255,0.2);
  border-radius:2.25rem;
}
.container > .inner{
  --padding:4rem;
  --spacing:1rem;
  padding:var(--padding);
  border-radius:calc(2.25rem - 1px);
  width:100%;
}
.container > .inner > *{margin-top:var(--spacing);margin-bottom:var(--spacing);}
.container > .inner > :first-child{margin-top:0 !important;}
.container > .inner > :last-child{margin-bottom:0 !important;}

/* Logo */
.logo{display:block;line-height:0;position:relative;}
.logo > .frame{
  display:inline-block;
  overflow:hidden;
  vertical-align:top;
  width:6.5rem;
  border-radius:100%;
  border:1px solid rgba(255,255,255,0.141);
}
.logo > .frame > img{
  border-radius:inherit;
  max-width:100%;
  vertical-align:top;
  width:inherit;
  padding:0.25rem;
}

/* Title */
.title{
  color:#FFFFFF;
  font-family:'Martian Mono', monospace;
  letter-spacing:0.025rem;
  font-size:2.75em;
  line-height:1.2;
  font-weight:200;
}

/* Subtitle */
.subtitle{
  color:rgba(255,255,255,0.612);
  font-family:'Martian Mono', monospace;
  font-size:1em;
  line-height:2;
  font-weight:200;
}

/* Button */
.buttons{
  cursor:default;
  display:flex;
  justify-content:center;
  gap:0.875rem;
  flex-direction:row;
  flex-wrap:wrap;
  padding:0;
  margin-top:3rem !important;
  margin-bottom:3rem !important;
}
.buttons > li{max-width:100%;text-align:center;}
.buttons > li > a{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:10.875rem;
  height:3.625rem;
  line-height:3.625rem;
  padding:0 0.5rem;
  vertical-align:middle;
  text-align:center;
  text-decoration:none;
  white-space:nowrap;
  font-family:'Martian Mono', monospace;
  font-size:1em;
  font-weight:200;
  border-radius:2.5rem;
  flex-direction:row-reverse;
  background-color:#DE8B5D;
  color:#FFFFFF;
  background-image:linear-gradient(243deg, #8C51D6 0%, rgba(222,139,93,0.012) 74%);
  background-position:0% 0%;
  background-repeat:repeat;
  background-size:cover;
  transition:transform 0.25s ease, color 0.25s ease, background-color 0.25s ease, border-color 0.25s ease;
}
.buttons > li > a > svg{
  display:block;
  fill:#FFFFFF;
  flex-grow:0;
  flex-shrink:0;
  height:100%;
  min-width:16px;
  pointer-events:none;
  width:1.25em;
  margin-left:1rem;
  margin-right:calc(-0.125em + 0rem);
  transition:fill 0.25s ease;
}
.buttons > li > a > .label{overflow:hidden;}
.buttons > li > a:hover{
  background-color:#F29D6D !important;
  transform:scale(1.0425);
}

/* Divider */
.divider{
  align-items:center;
  border:0;
  display:flex;
  justify-content:center;
  min-height:1rem;
  padding:0;
  position:relative;
  width:100%;
  margin-top:3rem !important;
  margin-bottom:3rem !important;
}
.divider::before{content:'';width:100%;background-color:rgba(255,255,255,0.2);height:1px;}

/* Entrance animations */
@keyframes fade-up{from{opacity:0;transform:translateY(1.25rem);}to{opacity:1;transform:none;}}
@keyframes fade-in{from{opacity:0;}to{opacity:1;}}
.logo{animation:fade-up 1s ease both;}
.title{animation:fade-up 1s ease 0.125s both;}
.subtitle{animation:fade-in 0.6s ease 0.35s both;}
.buttons{animation:fade-up 1s ease 0.35s both;}
@media (prefers-reduced-motion: reduce){
  .logo,.title,.subtitle,.buttons{animation:none;}
}

/* Responsive */
@media (max-width:1680px){html{font-size:11pt;}}
@media (max-width:1280px){html{font-size:11pt;}}
@media (max-width:980px){html{font-size:9pt;}}
@media (max-width:736px){
  html{font-size:10pt;}
  .site-wrapper{padding:2rem;}
  .site-main > .inner{--padding-horizontal:1rem;--padding-vertical:1rem;--spacing:2rem;}
  .container > .inner{--padding:2.5rem;}
  .buttons{margin-top:2.25rem !important;margin-bottom:2.25rem !important;}
  .divider{margin-top:2rem !important;margin-bottom:2rem !important;}
}
@media (max-width:480px){
  .site-wrapper{padding:1rem;}
  .site-main > .inner{--spacing:1.75rem;}
}
@media (max-width:360px){
  .site-wrapper{padding:0.5rem;}

  .title{font-size:2em;}
  .container > .inner{--padding:1.875rem;}
}
</style>
